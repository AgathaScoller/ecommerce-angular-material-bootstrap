<main style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
  <section style="width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 8px;">
    <h2>Login</h2>
    <form>
      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input type="email" class="form-control" placeholder="email@exemplo.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control">
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
  </section>
</main>
